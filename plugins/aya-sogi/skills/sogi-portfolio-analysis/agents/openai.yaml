interface:
  display_name: "Análise de portfólio SOGI"
  short_description: "Analise saúde, receita e geografia da carteira"
  default_prompt: "Use $sogi-portfolio-analysis para analisar esta carteira com dados atuais do SOGI."

dependencies:
  tools:
    - type: "mcp"
      value: "sogi"
      description: "MCP autorizado do ecossistema SOGI/CEPPEM"
      transport: "streamable_http"
      url: "https://mcp.dev.ceppem.com/mcp"

policy:
  allow_implicit_invocation: true
