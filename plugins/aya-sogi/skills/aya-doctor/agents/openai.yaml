interface:
  display_name: "Diagnóstico AyA"
  short_description: "Diagnostique instalação, OAuth e conexão SOGI"
  default_prompt: "Use $aya-doctor para diagnosticar por que a AyA ou o MCP SOGI não está disponível."

dependencies:
  tools:
    - type: "mcp"
      value: "sogi"
      description: "MCP autorizado do ecossistema SOGI/CEPPEM"
      transport: "streamable_http"
      url: "https://mcp.dev.ceppem.com/mcp"

policy:
  allow_implicit_invocation: true
