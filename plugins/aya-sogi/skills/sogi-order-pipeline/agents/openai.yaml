interface:
  display_name: "Pipeline de pedidos SOGI"
  short_description: "Analise funil, status e gargalos dos pedidos"
  default_prompt: "Use $sogi-order-pipeline para analisar o pipeline de pedidos no período solicitado."

dependencies:
  tools:
    - type: "mcp"
      value: "sogi"
      description: "MCP autorizado do ecossistema SOGI/CEPPEM"
      transport: "streamable_http"
      url: "https://mcp.dev.ceppem.com/mcp"

policy:
  allow_implicit_invocation: true
