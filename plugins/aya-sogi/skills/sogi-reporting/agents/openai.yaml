interface:
  display_name: "Relatórios SOGI"
  short_description: "Gere relatórios rastreáveis com dados SOGI"
  default_prompt: "Use $sogi-reporting para criar um relatório rastreável a partir desta consulta SOGI."

dependencies:
  tools:
    - type: "mcp"
      value: "sogi"
      description: "MCP autorizado do ecossistema SOGI/CEPPEM"
      transport: "streamable_http"
      url: "https://mcp.dev.ceppem.com/mcp"

policy:
  allow_implicit_invocation: true
